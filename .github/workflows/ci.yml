name: CI / CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Back-end build & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back-end

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: back-end/tests/**/TestResults/*.trx

  frontend:
    name: Front-end build & type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front-end

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Build front-end
        working-directory: front-end
        run: |
          npm ci
          npx vite build

      - name: Publish back-end
        working-directory: back-end
        run: dotnet publish src/Icon.Api/Icon.Api.csproj -c Release -r linux-x64 --self-contained true -o ${{ github.workspace }}/publish
        
      - name: Copy front-end into wwwroot
        run: |
          mkdir -p ${{ github.workspace }}/publish/wwwroot
          cp -r front-end/dist/* ${{ github.workspace }}/publish/wwwroot/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

      - name: Build
        run: npx vite build
